{% extends 'base.html' %}

{% block title %}New Task - Task Collaboration Tool{% endblock %}
{% block page_title %}Create New Task{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Create Task in {{ project.name }}</h2>

        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="title" class="block text-sm font-semibold text-gray-700 mb-2">Task Title *</label>
                <input type="text" id="title" name="title" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="Enter task title">
            </div>

            <div>
                <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                <textarea id="description" name="description" rows="5"
                          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                          placeholder="Enter task description"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label for="priority" class="block text-sm font-semibold text-gray-700 mb-2">Priority</label>
                    <select id="priority" name="priority" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                        {% for key, value in priorities.items %}
                        <option value="{{ key }}">{{ value }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div>
                    <label for="due_date" class="block text-sm font-semibold text-gray-700 mb-2">Due Date</label>
                    <input type="datetime-local" id="due_date" name="due_date"
                           class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <label for="assigned_to" class="block text-sm font-semibold text-gray-700 mb-2">Assign To</label>
                <select id="assigned_to" name="assigned_to" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500">
                    <option value="">No one</option>
                    {% for member in members %}
                    <option value="{{ member.id }}">{{ member.get_full_name|default:member.username }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                    <i class="fas fa-plus mr-2"></i>Create Task
                </button>
                <a href="{% url 'project_detail' project.id %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-lg font-semibold transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
