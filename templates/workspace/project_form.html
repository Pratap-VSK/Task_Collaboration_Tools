{% extends 'base.html' %}

{% block title %}{% if is_edit %}Edit{% else %}Create{% endif %} Project - Task Collaboration Tool{% endblock %}
{% block page_title %}{% if is_edit %}Edit{% else %}New{% endif %} Project{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white rounded-lg shadow p-8">
        <form method="POST" class="space-y-6">
            {% csrf_token %}

            <div>
                <label for="name" class="block text-sm font-semibold text-gray-700 mb-2">Project Name *</label>
                <input type="text" id="name" name="name" value="{{ project.name }}" required
                       class="w-full px-4 py-2 text-gray-900 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       placeholder="Enter project name">
            </div>

            <div>
                <label for="description" class="block text-sm font-semibold text-gray-700 mb-2">Description</label>
                <textarea id="description" name="description" rows="5"
                          class="w-full px-4 py-2 text-gray-900 bg-white border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                          placeholder="Enter project description">{{ project.description }}</textarea>
            </div>

            <div>
                <label for="color" class="block text-sm font-semibold text-gray-700 mb-2">Project Color</label>
                <div class="flex items-center gap-4">
                    <input type="color" id="color" name="color" value="{{ project.color|default:'#3B82F6' }}"
                           class="h-12 w-20 rounded-lg border-2 border-gray-300 cursor-pointer">
                    
                    <div class="flex flex-wrap gap-2" id="color-buttons">
                        <button type="button" class="w-8 h-8 rounded-lg border-2 border-gray-300 hover:border-gray-600 transition-colors color-btn" style="background-color: #3B82F6" data-color="#3B82F6"></button>
                        <button type="button" class="w-8 h-8 rounded-lg border-2 border-gray-300 hover:border-gray-600 transition-colors color-btn" style="background-color: #EF4444" data-color="#EF4444"></button>
                        <button type="button" class="w-8 h-8 rounded-lg border-2 border-gray-300 hover:border-gray-600 transition-colors color-btn" style="background-color: #10B981" data-color="#10B981"></button>
                        <button type="button" class="w-8 h-8 rounded-lg border-2 border-gray-300 hover:border-gray-600 transition-colors color-btn" style="background-color: #F59E0B" data-color="#F59E0B"></button>
                        <button type="button" class="w-8 h-8 rounded-lg border-2 border-gray-300 hover:border-gray-600 transition-colors color-btn" style="background-color: #8B5CF6" data-color="#8B5CF6"></button>
                        <button type="button" class="w-8 h-8 rounded-lg border-2 border-gray-300 hover:border-gray-600 transition-colors color-btn" style="background-color: #EC4899" data-color="#EC4899"></button>
                    </div>
                </div>
            </div>

            <div class="flex gap-4">
                <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg font-semibold transition-colors">
                    <i class="fas fa-save mr-2"></i>{% if is_edit %}Update{% else %}Create{% endif %} Project
                </button>
                <a href="{% url 'project_list' %}" class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-6 py-2 rounded-lg font-semibold transition-colors">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const colorInput = document.getElementById('color');
        const colorButtons = document.querySelectorAll('.color-btn');

        colorButtons.forEach(button => {
            button.addEventListener('click', function() {
                // Remove ring from all buttons
                colorButtons.forEach(btn => btn.classList.remove('ring-2', 'ring-offset-2', 'ring-gray-400'));
                
                // Add ring to clicked button
                this.classList.add('ring-2', 'ring-offset-2', 'ring-gray-400');
                
                // Update the actual color input value
                colorInput.value = this.getAttribute('data-color');
            });
        });
    });
</script>
{% endblock %}
