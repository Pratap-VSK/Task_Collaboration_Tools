{% extends 'base.html' %}

{% block title %}Edit Profile - CollabTools{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow dark:shadow-gray-700 p-6">
        <h1 class="text-2xl font-bold mb-6">Edit Profile</h1>

        <form method="post" class="space-y-4">
            {% csrf_token %}

            <div>
                <label for="id_email" class="block text-sm font-medium mb-1">Email</label>
                {{ form.email }}
                {% if form.email.errors %}
                <div class="text-red-500 text-sm mt-1">{{ form.email.errors.0 }}</div>
                {% endif %}
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label for="id_first_name" class="block text-sm font-medium mb-1">First Name</label>
                    {{ form.first_name }}
                </div>
                <div>
                    <label for="id_last_name" class="block text-sm font-medium mb-1">Last Name</label>
                    {{ form.last_name }}
                </div>
            </div>

            <div>
                <label for="id_bio" class="block text-sm font-medium mb-1">Bio</label>
                <textarea id="id_bio" name="bio" rows="4" class="w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-gray-100 focus:outline-none" placeholder="Tell us about yourself...">{{ user.userprofile.bio }}</textarea>
            </div>

            <div class="flex gap-2">
                <button type="submit" class="px-4 py-2 rounded-lg text-white transition" style="background-color: var(--color-primary);">
                    <i class="fas fa-save mr-2"></i>Save Changes
                </button>
                <a href="{% url 'settings' %}" class="px-4 py-2 rounded-lg bg-gray-300 dark:bg-gray-600 text-gray-800 dark:text-gray-100 hover:bg-gray-400 dark:hover:bg-gray-500 transition">
                    Cancel
                </a>
            </div>
        </form>
    </div>
</div>

<style>
    input[type="text"],
    input[type="email"],
    textarea {
        @apply w-full px-3 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 dark:text-gray-100 focus:outline-none;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    textarea:focus {
        @apply ring-2 ring-opacity-50;
    }
</style>
{% endblock %}
